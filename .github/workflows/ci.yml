name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workout_social_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: workout_social_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_social_test
      JWT_SECRET: test-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d workout_social_test -f src/db.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d workout_social_test -f src/migrate_profile_pic.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d workout_social_test -f src/add_password_reset_fields.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d workout_social_test -f src/seed_exercises.sql

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Expo doctor
        run: npx expo-doctor

      - name: Test
        run: npm test
